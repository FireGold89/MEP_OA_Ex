<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>採購一鍵通</title>
    <link rel="stylesheet" href="content.css">
    <style>
        /* ===== Popup-specific overrides ===== */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            width: 380px;
            min-height: 560px;
            max-height: 640px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Microsoft JhengHei", Roboto, sans-serif;
            background: var(--ym-bg, #f4f4f8);
        }

        #oa-side-panel {
            position: static;
            width: 100%;
            height: 640px;
            box-shadow: none;
            border-radius: 0;
            border: none;
            transform: none !important;
            transition: none !important;
            opacity: 1 !important;
        }

        #oa-panel-close { display: none !important; }

        .oa-p-group input,
        .oa-p-group textarea,
        .oa-p-group select { box-sizing: border-box; width: 100%; }
    </style>
</head>

<body>
    <div id="oa-side-panel" class="open">

        <!-- ===== Header ===== -->
        <div class="ym-header">
            <div class="ym-header-left" style="display:flex; align-items:center; gap:10px;">
                <div class="ym-logo"><div class="oa-icon-o"><span class="oa-icon-a">A</span></div></div>
                <div>
                    <div class="ym-header-title">採購一鍵通</div>
                    <div class="ym-header-subtitle">OA 表單自動化工具</div>
                </div>
            </div>
            <div class="ym-header-right">
                <span id="oa-btn-refresh" title="同步數據">↻</span>
                <span id="oa-panel-close" title="隱藏視窗">✕</span>
            </div>
        </div>

        <!-- ===== Action Toolbar ===== -->
        <div class="oa-action-toolbar">
            <button class="oa-tool-btn outline" id="oa-btn-add" title="新增項目">➕ 新增</button>
            <button class="oa-tool-btn" id="oa-btn-import" title="匯入 CSV">↑ 匯入</button>
            <button class="oa-tool-btn" id="oa-btn-export" title="匯出 CSV">↓ 匯出</button>
            <button class="oa-tool-btn primary" id="oa-btn-save" title="保存當前">✔ 保存</button>
            <input type="file" id="in-f-file" class="hidden" accept=".csv">
        </div>

        <!-- ===== Tabs ===== -->
        <div class="oa-p-tabs">
            <div class="oa-p-tab active" id="tab-v-fill">快速填充</div>
            <div class="oa-p-tab" id="tab-v-manage">項目管理</div>
            <div class="oa-p-tab" id="tab-v-settings">更多設置</div>
        </div>

        <!-- ===== Fill View ===== -->
        <div id="view-v-fill" class="oa-panel-body">
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <input type="text" id="oa-search-input" class="oa-search-input" placeholder="🔍 搜尋項目或經理...">
            </div>
            <div class="oa-fill-toolbar">
                <button id="oa-btn-undo">↩ 恢復</button>
                <button id="oa-btn-clear">🧹 清空</button>
            </div>
            <div id="oa-disp-list"></div>
        </div>

        <!-- ===== Settings View ===== -->
        <div id="view-v-settings" class="oa-panel-body hidden">

            <div class="oa-settings-section">🎨 顯示偏好</div>

            <div class="oa-settings-row">
                <div>
                    <div class="oa-settings-label">項目標題字體大小</div>
                    <div class="oa-settings-desc">調整快速填充列表中的標題大小</div>
                </div>
                <div class="oa-settings-control">
                    <input type="range" class="oa-slider" id="set-title-size" min="12" max="18" value="15">
                    <span class="oa-slider-val" id="set-title-size-val">15px</span>
                </div>
            </div>

            <div class="oa-settings-row">
                <div>
                    <div class="oa-settings-label">副標題資訊</div>
                    <div class="oa-settings-desc">報價編號旁顯示的資訊</div>
                </div>
                <div class="oa-settings-control">
                    <div class="oa-seg-ctrl" id="set-subtitle-mode">
                        <button class="oa-seg-btn active" data-value="both">全部</button>
                        <button class="oa-seg-btn" data-value="reportNo">報價號</button>
                        <button class="oa-seg-btn" data-value="budget">預算</button>
                    </div>
                </div>
            </div>

            <div class="oa-settings-row">
                <div>
                    <div class="oa-settings-label">緊湊模式</div>
                    <div class="oa-settings-desc">縮小卡片間距使列表更緊湊</div>
                </div>
                <div class="oa-settings-control">
                    <label class="oa-toggle">
                        <input type="checkbox" id="set-compact-mode">
                        <div class="oa-toggle-track"></div>
                        <div class="oa-toggle-thumb"></div>
                    </label>
                </div>
            </div>

            <div class="oa-settings-section">⚙️ 功能設置</div>

            <div class="oa-settings-row">
                <div>
                    <div class="oa-settings-label">顯示懸浮輔助球</div>
                    <div class="oa-settings-desc">頁面右下角快速工具球</div>
                </div>
                <div class="oa-settings-control">
                    <label class="oa-toggle">
                        <input type="checkbox" id="oa-check-ball" checked>
                        <div class="oa-toggle-track"></div>
                        <div class="oa-toggle-thumb"></div>
                    </label>
                </div>
            </div>

            <div class="oa-settings-row">
                <div>
                    <div class="oa-settings-label">匯出確認提示</div>
                    <div class="oa-settings-desc">匯出前詢問是否覆蓋舊檔案</div>
                </div>
                <div class="oa-settings-control">
                    <label class="oa-toggle">
                        <input type="checkbox" id="set-export-confirm" checked>
                        <div class="oa-toggle-track"></div>
                        <div class="oa-toggle-thumb"></div>
                    </label>
                </div>
            </div>

            <div class="oa-settings-section">📁 數據管理</div>
            <div class="oa-settings-row" style="flex-direction:column; align-items:stretch; gap:8px;">
                <div style="display:flex; gap:8px;">
                    <button id="btn-f-export" style="flex:1; padding:10px; border-radius:12px; border:1px solid var(--ym-border); background:#fff; cursor:pointer; font-size:12px; font-weight:600; color:var(--ym-text-secondary);">↓ 匯出 CSV</button>
                    <button id="btn-f-import" style="flex:1; padding:10px; border-radius:12px; border:1px solid var(--ym-border); background:#fff; cursor:pointer; font-size:12px; font-weight:600; color:var(--ym-text-secondary);">↑ 匯入 CSV</button>
                </div>
            </div>
        </div>

        <!-- ===== Manage View ===== -->
        <div id="view-v-manage" class="oa-panel-body hidden">
            <h4 id="oa-p-title" style="margin:0 0 16px; font-size:15px; font-weight:700; color:var(--ym-text-main);">新增項目</h4>
            <input type="hidden" id="in-f-id">
            <input type="hidden" id="in-f-managerId">

            <div class="oa-p-group"><label>項目標題（顯示用）</label><input type="text" id="in-f-label" placeholder="例如：信成 - 電器材料"></div>

            <div class="oa-grid-row">
                <div class="oa-p-group"><label>物業名稱</label><input type="text" id="in-f-propertyName" placeholder="例如: 九龍灣車廠"></div>
                <div class="oa-p-group">
                    <label>項目經理</label>
                    <div class="oa-picker-container">
                        <input type="text" id="in-f-manager" placeholder="輸入姓名">
                        <button id="btn-f-pick" class="oa-picker-btn">🔍</button>
                    </div>
                </div>
            </div>

            <div class="oa-p-group"><label>美博報價編號</label><input type="text" id="in-f-reportNo" placeholder="例如: MS/Q1241/24/kp"></div>
            <div class="oa-p-group"><label>項目內容</label><textarea id="in-f-projectContent" rows="2" placeholder="項目內容描述"></textarea></div>

            <div class="oa-grid-row">
                <div class="oa-p-group"><label>合約總價</label><input type="text" id="in-f-total"></div>
                <div class="oa-p-group">
                    <label>報價形式</label>
                    <select id="in-f-quoteType">
                        <option value="">請選擇</option>
                        <option value="報價邀請">報價邀請</option>
                        <option value="招標">招標</option>
                        <option value="特殊情況 (緊急)">特殊情況 (緊急)</option>
                        <option value="續約">續約</option>
                    </select>
                </div>
            </div>

            <div class="oa-grid-row">
                <div class="oa-p-group">
                    <label>採購類別</label>
                    <select id="in-f-buyType">
                        <option value="">請選擇</option>
                        <option value="9">保養維修材料</option>
                        <option value="10">保養合約分判</option>
                        <option value="11">工程材料</option>
                        <option value="12">分判工程</option>
                        <option value="14">後加工程</option>
                        <option value="4">固定資產</option>
                        <option value="13">其他</option>
                    </select>
                </div>
                <div class="oa-p-group"><label>立項預算金額</label><input type="text" id="in-f-budget"></div>
            </div>

            <div class="oa-grid-row">
                <div class="oa-p-group">
                    <label>幣種</label>
                    <select id="in-f-currency">
                        <option value="0">HKD</option>
                        <option value="1">RMB</option>
                        <option value="2">USD</option>
                        <option value="3">MOP</option>
                    </select>
                </div>
            </div>

            <div class="oa-section-label">📦 報價明細</div>
            <div id="oa-detail-list" style="margin-bottom:10px;"></div>
            <button id="btn-add-detail" style="width:100%; padding:10px; border:1.5px dashed var(--ym-primary); color:var(--ym-primary); background:var(--ym-primary-soft); border-radius:12px; cursor:pointer; margin-bottom:16px; font-weight:600; font-size:13px; transition:all 0.2s;">+ 添加明細</button>

            <div class="oa-grid-row">
                <div class="oa-p-group"><label>邀請公司（間）</label><input type="text" id="in-f-inviteCount"></div>
                <div class="oa-p-group"><label>有效報價（份）</label><input type="text" id="in-f-replyCount"></div>
            </div>

            <div class="oa-p-group"><label>理由</label><textarea id="in-f-reason" rows="2"></textarea></div>
            <div class="oa-p-group"><label>中標公司</label><input type="text" id="in-f-winnerName"></div>

            <div class="oa-grid-row">
                <div class="oa-p-group">
                    <label>合約幣種</label>
                    <select id="in-f-contractCurrency">
                        <option value="0">HKD</option>
                        <option value="1">RMB</option>
                        <option value="2">USD</option>
                        <option value="3">MOP</option>
                    </select>
                </div>
                <div class="oa-p-group"><label>合約金額</label><input type="text" id="in-f-contractAmount"></div>
            </div>

            <button id="btn-f-save" class="oa-p-btn-action">儲存項目</button>
            <button id="btn-f-save-as-new" class="oa-p-btn-action hidden" style="background:transparent; border:1.5px solid var(--ym-primary); color:var(--ym-primary); margin-top:8px;">另存為新項目</button>
            <div id="btn-f-cancel" class="hidden" style="text-align:center; margin-top:10px; font-size:12px; color:var(--ym-text-muted); cursor:pointer;">取消編輯</div>
        </div>

        <!-- ===== Footer ===== -->
        <div style="padding:8px; text-align:center; font-size:10px; color:#c0c0cc; background:#fff; border-top:1px solid var(--ym-border); letter-spacing:0.5px; flex-shrink:0;">v4.12.4</div>

    </div><!-- #oa-side-panel -->

    <script src="popup.js"></script>
</body>

</html>
