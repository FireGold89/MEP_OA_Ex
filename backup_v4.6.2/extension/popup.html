<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>採購一鍵通 - 彈窗版</title>
    <link rel="stylesheet" href="content.css">
    <style>
        /* 覆寫部分懸浮面板的絕對定位和陰影，使其適應 Popup 固定大小 */
        body {
            margin: 0;
            padding: 0;
            width: 360px;
            /* 固定彈窗寬度 */
            max-height: 600px;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f7f9fc;
        }

        #oa-side-panel {
            /* 移除固定定位、陰影等，使其自然流動 */
            position: static;
            width: 100%;
            height: auto;
            box-shadow: none;
            border-radius: 0;
            transform: none !important;
            transition: none !important;
            margin: 0;
            display: flex;
            /* Ensure it is displayed, ignoring content.js hide logic */
            visibility: visible;
        }

        /* 隱藏關閉按鈕，因彈窗不需要 */
        #oa-panel-close {
            display: none !important;
        }

        /* 微調輸入框，防止在彈窗內被擠壓 */
        .oa-p-group input,
        .oa-p-group textarea,
        .oa-p-group select {
            box-sizing: border-box;
            width: 100%;
        }

        /* 防止明細行刪除按鈕重疊 */
        .oa-detail-row {
            padding-right: 25px !important;
        }
    </style>
</head>

<body>

    <!-- 完全複製自 content.js 的 panel 結構 -->
    <div id="oa-side-panel" class="open"> <!-- 預設為 open -->
        <div id="oa-panel-header">
            <div class="oa-header-left">
                <div class="oa-logo">un</div>
                <div class="oa-title-group">
                    <span style="font-size:16px;">💾</span>
                    <span>採購一鍵通</span>
                    <span style="font-size:10px; opacity:0.5;">▼</span>
                </div>
            </div>
            <div class="oa-header-right">
                <span class="oa-header-icon" title="更多設置">···</span>
                <span class="oa-header-icon" id="oa-btn-refresh" title="同步數據">↻</span>
                <span class="oa-header-icon close" id="oa-panel-close" title="隱藏視窗">✕</span>
            </div>
        </div>

        <div class="oa-action-toolbar"
            style="padding:10px 15px; display:flex; gap:6px; background:#fff; border-bottom:1px solid #eee;">
            <button class="oa-tool-btn" id="oa-btn-add" title="新增項目"
                style="flex:1; padding:6px 0; border:1px solid #764ba2; color:#764ba2; background:#fff; border-radius:6px; cursor:pointer; font-size:11px;">新增</button>
            <button class="oa-tool-btn" id="oa-btn-import" title="匯入 CSV"
                style="flex:1; padding:6px 0; border:1px solid #eee; color:#666; background:#fff; border-radius:6px; cursor:pointer; font-size:11px;">匯入</button>
            <button class="oa-tool-btn" id="oa-btn-export" title="匯出 CSV"
                style="flex:1; padding:6px 0; border:1px solid #eee; color:#666; background:#fff; border-radius:6px; cursor:pointer; font-size:11px;">匯出</button>
            <button class="oa-tool-btn" id="oa-btn-save" title="保存當前"
                style="flex:1.2; padding:6px 0; border:none; color:#fff; background:linear-gradient(135deg, #764ba2 0%, #667eea 100%); border-radius:6px; cursor:pointer; font-size:11px; font-weight:bold;">保存</button>
        </div>

        <div class="oa-p-tabs">
            <div class="oa-p-tab active" id="tab-v-fill">快速填充</div>
            <div class="oa-p-tab" id="tab-v-manage">項目管理</div>
        </div>

        <div id="view-v-fill" class="oa-panel-body">
            <div class="oa-section-header" style="display:flex; justify-content:space-between; align-items:center;">
                <div class="oa-section-title">📖 填充列表</div>
                <div class="oa-search-box" style="margin-left:auto;">
                    <input type="text" id="oa-search-input" placeholder="搜尋項目或經理..."
                        style="width:120px; padding:4px 8px; border-radius:12px; border:1px solid #ddd; font-size:12px; outline:none;">
                </div>
            </div>
            <!-- 新增：快速填充視圖按鈕工具欄 -->
            <div class="oa-fill-toolbar" style="padding:0 10px 10px 10px; display:flex; gap:8px;">
                <button id="oa-btn-undo" class="oa-tool-btn"
                    style="flex:1; padding:5px; border-radius:6px; border:1px solid #eee; background:#fff; cursor:pointer; font-size:11px;">↩️
                    恢復</button>
                <button id="oa-btn-clear" class="oa-tool-btn"
                    style="flex:1; padding:5px; border-radius:6px; border:1px solid #eee; background:#fff; cursor:pointer; font-size:11px;">🧹
                    清空</button>
            </div>
            <div id="oa-disp-list"></div>
        </div>

        <div id="view-v-manage" class="oa-panel-body hidden">
            <h4 id="oa-p-title" style="margin-top:0;">新增項目</h4>
            <input type="hidden" id="in-f-id">
            <input type="hidden" id="in-f-managerId">

            <div class="oa-p-group"><label>項目標題 (顯示用)</label><input type="text" id="in-f-label"
                    placeholder="例如：信成 - 電器材料"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="oa-p-group"><label>物業名稱</label><input type="text" id="in-f-propertyName"
                        placeholder="例如: 九龍灣車廠"></div>
                <div class="oa-p-group">
                    <label>項目經理</label>
                    <div style="display:flex;gap:4px;">
                        <input type="text" id="in-f-manager" style="flex:1;" placeholder="輸入姓名或選取">
                        <button id="btn-f-pick"
                            style="padding:4px 10px; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:white;">🔍</button>
                    </div>
                </div>
            </div>

            <div class="oa-p-group"><label>美博報價編號</label><input type="text" id="in-f-reportNo"
                    placeholder="例如: MS/Q1241/24/kp"></div>

            <div class="oa-p-group"><label>項目內容</label><textarea id="in-f-projectContent" rows="3"
                    placeholder="項目內容"></textarea></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="oa-p-group"><label>合約總價</label><input type="text" id="in-f-total"></div>
                <div class="oa-p-group">
                    <label>報價形式</label>
                    <select id="in-f-quoteType">
                        <option value="">請選擇</option>
                        <option value="報價邀請">報價邀請</option>
                        <option value="招標">招標</option>
                        <option value="特殊情況 (緊急)">特殊情況 (緊急)</option>
                        <option value="續約">續約</option>
                    </select>
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="oa-p-group">
                    <label>採購類別</label>
                    <select id="in-f-buyType">
                        <option value="">請選擇</option>
                        <option value="保養維修材料">保養維修材料</option>
                        <option value="保養合約分判">保養合約分判</option>
                        <option value="工程材料">工程材料</option>
                        <option value="分判工程">分判工程</option>
                        <option value="後加工程">後加工程</option>
                        <option value="固定資產">固定資產</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="oa-p-group"><label>立項預算金額</label><input type="text" id="in-f-budget"></div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="oa-p-group">
                    <label>幣種</label>
                    <select id="in-f-currency">
                        <option value="0">HKD</option>
                        <option value="1">RMB</option>
                        <option value="2">USD</option>
                        <option value="3">MOP</option>
                    </select>
                </div>
            </div>

            <div class="oa-section-title">📦 報價明細</div>
            <div id="oa-detail-list" style="margin-bottom:10px;"></div>
            <button id="btn-add-detail"
                style="width:100%; padding:8px; border:1px dashed #764ba2; color:#764ba2; background:none; border-radius:10px; cursor:pointer; margin-bottom:15px; font-weight:600;">+
                添加明細</button>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="oa-p-group"><label>邀請公司 (間)</label><input type="text" id="in-f-inviteCount"></div>
                <div class="oa-p-group"><label>有效報價/回復 (份)</label><input type="text" id="in-f-replyCount"></div>
            </div>

            <div class="oa-p-group"><label>理由</label><textarea id="in-f-reason" rows="2"></textarea></div>
            <div class="oa-p-group"><label>中標公司</label><input type="text" id="in-f-winnerName"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="oa-p-group">
                    <label>合約幣種</label>
                    <select id="in-f-contractCurrency">
                        <option value="0">HKD</option>
                        <option value="1">RMB</option>
                        <option value="2">USD</option>
                        <option value="3">MOP</option>
                    </select>
                </div>
                <div class="oa-p-group"><label>合約金額</label><input type="text" id="in-f-contractAmount"></div>
            </div>

            <button id="btn-f-save" class="oa-p-btn-action">儲存項目</button>
            <button id="btn-f-save-as-new" class="oa-p-btn-action hidden"
                style="background:none; border:1px solid #764ba2; color:#764ba2; margin-top:10px;">另存為新項目</button>
            <div id="btn-f-cancel"
                style="text-align:center; margin-top:10px; font-size:12px; color:#999; cursor:pointer;" class="hidden">
                取消編輯</div>

            <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px; display:flex; gap:8px;">
                <button id="btn-f-export" style="flex:1; font-size:11px; padding:6px; cursor:pointer;">匯出</button>
                <button id="btn-f-import" style="flex:1; font-size:11px; padding:6px; cursor:pointer;">匯入</button>
                <input type="file" id="in-f-file" class="hidden" accept=".csv">
            </div>
        </div>

        <div style="padding:15px; font-size:10px; color:#ddd; text-align:center; background:#fafafa;">v4.6.2 (Popup
            Unified)</div>
    </div> <!-- #oa-side-panel -->

    <script src="popup.js"></script>
</body>

</html>
